# ---------------------------------------------------------
# UVfinder Pipeline Environment Configuration
# ---------------------------------------------------------

name: uvfinder

channels:
  - conda-forge
  - bioconda
  - defaults

dependencies:
  # Core Dependencies
  - python=3.11
  - snakemake=8.4.1
  - pandas
  - mamba

  # Sex ID & Query Search
  - blast=2.15.0
  - bedtools
  - samtools
  - biopython
  - seqkit  

  # sequence alignment & phylogenetic analysis
  - mafft
  - trimal 
  - iqtree